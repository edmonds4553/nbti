<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBTI</title>
  <style>
    :root {
      --bg: #f5f7f9;
      --panel: #ffffff;
      --panel-strong: #ffffff;
      --line: rgba(52, 63, 79, 0.1);
      --text: #27303f;
      --muted: #657081;
      --accent: #2e9b92;
      --accent-2: #3fb4a9;
      --accent-3: #8bd9cf;
      --accent-pink: #8e7dff;
      --accent-yellow: #e3b341;
      --accent-mint: #6fc8b7;
      --shadow: 0 10px 30px rgba(30, 40, 56, 0.06);
      --radius: 24px;
      --radius-sm: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(63, 180, 169, 0.06), transparent 30%),
        linear-gradient(180deg, #fbfcfd 0%, #f5f7f9 44%, #f1f4f6 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .page {
      width: min(1720px, calc(100% - 40px));
      margin: 0 auto;
      padding: 104px 0 48px;
    }

    .hero,
    .panel,
    .question-card,
    .result-card,
    .gallery-card,
    .mini-card {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .app-navbar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 80;
      width: 100%;
      padding: 14px 0;
      border-radius: 0;
      border-left: none;
      border-right: none;
      border-top: none;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 2px 0 rgba(52, 63, 79, 0.04);
    }

    .nav-inner {
      width: min(1720px, calc(100% - 40px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-logo {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #2e9b92, #3fb4a9);
      box-shadow: 0 8px 18px rgba(46, 155, 146, 0.16);
      border: 1px solid rgba(46, 155, 146, 0.14);
    }

    .nav-logo::before {
      content: none;
    }

    .nav-logo::after {
      content: none;
    }

    .nav-home {
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      text-align: left;
      color: var(--text);
    }

    .nav-home strong {
      display: block;
      font-size: 20px;
      letter-spacing: 0.04em;
    }

    .nav-home span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero {
      padding: 26px 8px 18px;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .home-shell {
      min-height: calc(100vh - 152px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 42px;
      align-items: stretch;
    }

    .hero-copy {
      min-width: 0;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      padding-top: 6px;
    }

    .hero-subtitle {
      margin-top: 16px;
      font-size: 24px;
      line-height: 1.4;
      color: #3e4856;
      font-weight: 700;
    }

    .hero-main-flow {
      margin-top: 24px;
      display: grid;
      gap: 34px;
    }

    .hero-visual {
      display: grid;
      gap: 16px;
    }

    .hero-visual-card {
      border: 1px solid rgba(52, 63, 79, 0.08);
      border-radius: 28px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbfa 100%);
      box-shadow: 0 18px 40px rgba(30, 40, 56, 0.06);
    }

    .hero-visual-main {
      padding: 24px;
    }

    .hero-visual-title {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .hero-visual-stack {
      margin-top: 16px;
      display: grid;
      gap: 14px;
    }

    .hero-visual-person {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      padding: 14px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid rgba(52, 63, 79, 0.08);
    }

    .hero-visual-person h3 {
      font-size: 18px;
      margin: 0 0 6px;
    }

    .hero-visual-person p {
      margin: 0;
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
    }

    .hero-visual-person .avatar-code {
      min-width: 76px;
      padding: 8px 16px 7px;
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    .hero-visual-note {
      padding: 18px 20px;
      display: grid;
      gap: 6px;
    }

    .hero-visual-note strong {
      font-size: 16px;
    }

    .hero-visual-note span {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 15px;
      border-radius: 999px;
      border: 1px solid rgba(46, 155, 146, 0.14);
      color: #4b6670;
      font-size: 14px;
      letter-spacing: 0.03em;
      background: #f3fbfa;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .hero h1 {
      margin-top: 14px;
      font-size: clamp(48px, 7vw, 72px);
      line-height: 1.02;
      max-width: 700px;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin-top: 0;
      max-width: 700px;
      color: var(--muted);
      line-height: 1.9;
      font-size: 18px;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 0;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      color: #50606d;
      background: #f6f8fa;
      border: 1px solid rgba(52, 63, 79, 0.08);
    }

    .hero-stat-strip {
      margin-top: 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .hero-stat {
      padding: 16px 18px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(247, 250, 252, 0.96) 100%);
      border: 1px solid rgba(52, 63, 79, 0.08);
      box-shadow: 0 10px 24px rgba(30, 40, 56, 0.04);
    }

    .hero-stat strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      color: #2d3747;
    }

    .hero-stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .hero-inline-note {
      margin-top: auto;
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(52, 63, 79, 0.08);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .hero-inline-note strong {
      color: #394455;
      font-weight: 700;
    }

    .meme-strip {
      margin-top: 38px;
      padding: 10px 8px 0;
      border-top: 1px solid rgba(52, 63, 79, 0.08);
    }

    .meme-strip-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .meme-strip-head h2 {
      font-size: 24px;
      letter-spacing: -0.02em;
    }

    .meme-strip-head p {
      max-width: 560px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      text-align: right;
    }

    .meme-strip-cloud {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .meme-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(52, 63, 79, 0.08);
      box-shadow: 0 8px 22px rgba(30, 40, 56, 0.04);
      color: #3d4757;
      font-size: 13px;
      line-height: 1;
    }

    .meme-pill strong {
      font-size: 12px;
      color: #2e9b92;
      letter-spacing: 0.04em;
    }

    .meme-strip-footer {
      margin-top: 14px;
      color: #7b8796;
      font-size: 13px;
      line-height: 1.8;
    }

    .cta-row,
    .toolbar,
    .result-actions,
    .gallery-actions,
    .summary-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .cta-row {
      margin-top: 0;
    }

    .button,
    .ghost-button {
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 13px 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .button {
      color: #ffffff;
      background: #2e9b92;
      box-shadow: 0 8px 20px rgba(46, 155, 146, 0.18);
    }

    .ghost-button {
      color: var(--text);
      background: #ffffff;
      border-color: rgba(52, 63, 79, 0.1);
    }

    .button:disabled,
    .ghost-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      box-shadow: none;
      transform: none;
    }

    .button:hover,
    .ghost-button:hover,
    .option:hover,
    .gallery-card:hover,
    .mini-card:hover {
      transform: translateY(-1px);
    }

    .stats-grid,
    .feature-grid,
    .question-meta,
    .result-layout,
    .gallery-grid,
    .mini-grid,
    .top-grid {
      display: grid;
      gap: 16px;
    }

    .feature-grid {
      margin-top: 28px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .mini-card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      padding: 22px;
      background: #ffffff;
    }

    .mini-card::before {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 0;
      height: 4px;
      border-radius: 0 0 999px 999px;
      background: #dbe6ff;
    }

    .mini-card .label {
      color: #6a7380;
      font-size: 12px;
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    .mini-card strong {
      display: block;
      margin-top: 8px;
      font-size: 22px;
    }

    .mini-card span {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .mini-card.tone-blue::before {
      background: linear-gradient(90deg, #6a94ff, #8bb2ff);
    }

    .mini-card.tone-pink::before {
      background: linear-gradient(90deg, #ff8ebc, #ffb4cf);
    }

    .mini-card.tone-yellow::before {
      background: linear-gradient(90deg, #ffca57, #ffd978);
    }

    .panel {
      margin-top: 28px;
      padding: 30px;
      border-radius: 28px;
    }

    .panel h2,
    .question-card h2,
    .result-card h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .panel .desc,
    .question-subtitle,
    .muted,
    .summary-copy {
      color: var(--muted);
      line-height: 1.8;
    }

    .toolbar {
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .question-card {
      border-radius: 28px;
      padding: 30px;
    }

    .question-meta {
      grid-template-columns: 1.3fr 1fr;
      align-items: center;
      margin-bottom: 24px;
    }

    .progress-wrap {
      height: 12px;
      background: rgba(46, 155, 146, 0.08);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(46, 155, 146, 0.08);
    }

    .progress-bar {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
      transition: width 0.25s ease;
    }

    .question-no {
      color: var(--accent-2);
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .question-title {
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.35;
      margin-bottom: 12px;
    }

    .question-hint {
      margin-top: 10px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #f6fbfa;
      border: 1px solid rgba(46, 155, 146, 0.12);
      color: #5d6a79;
      font-size: 14px;
      line-height: 1.8;
    }

    .options {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    .option {
      width: 100%;
      text-align: left;
      padding: 18px 18px 18px 20px;
      border-radius: 20px;
      color: var(--text);
      border: 1px solid rgba(52, 63, 79, 0.08);
      background: #f8fafb;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .option:hover {
      border-color: rgba(46, 155, 146, 0.24);
      background: #f2fbf9;
    }

    .option-index {
      display: inline-flex;
      width: 32px;
      height: 32px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      margin-right: 12px;
      font-weight: 700;
      color: #091018;
      background: #edf7f6;
    }

    .option-text {
      display: inline;
      line-height: 1.8;
      font-size: 15px;
    }

    .result-layout {
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      align-items: start;
      margin-top: 20px;
    }

    .result-card {
      border-radius: 30px;
      padding: 32px;
    }

    .role-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .role-badge-wrap {
      flex: 0 0 auto;
    }

    .badge-chip {
      --badge-main: #7c8cff;
      --badge-sub: #42e8e0;
      --badge-glow: rgba(124, 140, 255, 0.4);
      position: relative;
      width: 92px;
      height: 92px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 6px 14px rgba(37, 62, 98, 0.1));
    }

    .badge-chip.large {
      width: 116px;
      height: 116px;
    }

    .badge-shell {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(244, 248, 255, 0.96));
      border: 1px solid rgba(61, 109, 242, 0.12);
      overflow: hidden;
    }

    .shape-hex .badge-shell {
      clip-path: polygon(24% 6%, 76% 6%, 96% 50%, 76% 94%, 24% 94%, 4% 50%);
      border-radius: 22px;
    }

    .shape-octagon .badge-shell {
      clip-path: polygon(24% 0, 76% 0, 100% 24%, 100% 76%, 76% 100%, 24% 100%, 0 76%, 0 24%);
      border-radius: 24px;
    }

    .shape-diamond .badge-shell {
      clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
      border-radius: 26px;
    }

    .shape-pill .badge-shell {
      border-radius: 30px;
    }

    .shape-round .badge-shell {
      border-radius: 50%;
    }

    .badge-shell::before,
    .badge-shell::after {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: inherit;
      pointer-events: none;
    }

    .badge-shell::before {
      border: 1px solid rgba(61, 109, 242, 0.08);
      box-shadow: none;
    }

    .badge-shell::after {
      content: none;
    }

    .badge-ring,
    .badge-core,
    .badge-mark {
      position: absolute;
      pointer-events: none;
    }

    .badge-ring {
      width: 66%;
      height: 66%;
      border: 2px solid rgba(61, 109, 242, 0.16);
      box-shadow: none;
    }

    .ring-dual {
      border-radius: 30%;
      transform: rotate(12deg);
    }

    .ring-dashed {
      border-radius: 50%;
      border-style: dashed;
    }

    .ring-split {
      border-radius: 50%;
      border-top-color: var(--badge-main);
      border-right-color: rgba(255, 255, 255, 0.08);
      border-bottom-color: var(--badge-sub);
      border-left-color: transparent;
      transform: rotate(-18deg);
    }

    .ring-square {
      border-radius: 18px;
    }

    .ring-halo {
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(61, 109, 242, 0.06);
    }

    .badge-core {
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--badge-main), var(--badge-sub));
      box-shadow: 0 4px 10px rgba(32, 51, 79, 0.12);
    }

    .core-dot {
      width: 22%;
      height: 22%;
      border-radius: 50%;
    }

    .core-bar {
      width: 18%;
      height: 46%;
      border-radius: 999px;
    }

    .core-diamond {
      width: 28%;
      height: 28%;
      transform: rotate(45deg);
    }

    .core-triangle {
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-bottom: 28px solid var(--badge-main);
      background: none;
      box-shadow: none;
      filter: drop-shadow(0 0 10px var(--badge-glow));
    }

    .core-square {
      width: 28%;
      height: 28%;
      border-radius: 8px;
    }

    .core-wave {
      width: 42%;
      height: 12%;
      border-radius: 999px;
      transform: rotate(-10deg);
    }

    .badge-mark {
      inset: 18%;
    }

    .mark-scan::before,
    .mark-scan::after,
    .mark-spark::before,
    .mark-spark::after,
    .mark-crack::before,
    .mark-crack::after,
    .mark-crown::before,
    .mark-crown::after,
    .mark-fan::before,
    .mark-fan::after,
    .mark-pulse::before,
    .mark-pulse::after {
      content: "";
      position: absolute;
    }

    .mark-scan::before {
      inset: 18% 8%;
      border-top: 1px solid rgba(255, 255, 255, 0.32);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      transform: skewY(-12deg);
    }

    .mark-scan::after {
      inset: 48% 18% auto 18%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--badge-main), transparent);
    }

    .mark-spark::before {
      top: 10%;
      right: 14%;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: var(--badge-sub);
      transform: rotate(45deg);
      box-shadow: 0 0 10px var(--badge-glow);
    }

    .mark-spark::after {
      bottom: 16%;
      left: 18%;
      width: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
    }

    .mark-crack::before {
      inset: 16% auto 18% 44%;
      width: 2px;
      background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.62), transparent);
      transform: rotate(12deg);
    }

    .mark-crack::after {
      inset: 50% 22% auto auto;
      width: 28px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.42));
      transform: rotate(-24deg);
    }

    .mark-crown::before {
      top: 14%;
      left: 50%;
      width: 34px;
      height: 14px;
      transform: translateX(-50%);
      clip-path: polygon(0 100%, 10% 26%, 28% 70%, 50% 0, 72% 70%, 90% 26%, 100% 100%);
      background: linear-gradient(90deg, var(--badge-main), var(--badge-sub));
    }

    .mark-crown::after {
      bottom: 16%;
      left: 50%;
      width: 38px;
      height: 2px;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.35);
    }

    .mark-fan::before {
      inset: 28% auto auto 18%;
      width: 50px;
      height: 24px;
      border-top: 2px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;
      transform: rotate(-18deg);
    }

    .mark-fan::after {
      inset: auto 16% 18% auto;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 10px var(--badge-glow);
    }

    .mark-pulse::before {
      inset: 46% 16% auto 16%;
      height: 2px;

    };
    APP_DATA.roles = APP_DATA.roles.map((role) => ({ ...role, ...ROLE_DETAILS[role.id] }));
    const ROLE_MAP = Object.fromEntries(APP_DATA.roles.map((role, index) => [role.id, { ...role, order: index }]));
    const TOTAL_QUESTIONS = 20;

    const state = {
      currentView: "home",
      previousView: "home",
      selectedRoleId: "",

      currentQuestionIndex: 0,
      scores: createEmptyScores(),
      answers: [],
      resultRoleId: "",
      shareText: ""
    };

    function createEmptyScores() {
      return APP_DATA.roles.reduce((result, role) => {
        result[role.id] = 0;
        return result;
      }, {});
    }

    function buildNavState() {
      return {
        currentView: state.currentView,
        previousView: state.previousView,
        selectedRoleId: state.selectedRoleId,
        resultRoleId: state.resultRoleId,
        shareText: state.shareText
      };
    }

    function applyNavState(nextState) {
      if (!nextState) {
        return;
      }

      state.currentView = nextState.currentView || "home";
      state.previousView = nextState.previousView || "home";
      state.selectedRoleId = nextState.selectedRoleId || "";
      state.resultRoleId = nextState.resultRoleId || "";
      state.shareText = nextState.shareText || "";
    }

    function syncHistory(mode = "push") {
      if (!window.history || typeof window.history.pushState !== "function") {
        return;
      }

      const snapshot = buildNavState();
      if (mode === "replace" && typeof window.history.replaceState === "function") {
        window.history.replaceState(snapshot, "", "");
        return;
      }

      window.history.pushState(snapshot, "", "");
    }

    function shuffle(list) {
      const copied = [...list];
      for (let index = copied.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [copied[index], copied[swapIndex]] = [copied[swapIndex], copied[index]];
      }
      return copied;
    }

    function sampleQuestions(total) {
      return shuffle(APP_DATA.questions).slice(0, total);
    }

    function resetQuizState() {
      state.selectedQuestions = [];
      state.currentQuestionIndex = 0;
      state.scores = createEmptyScores();
      state.answers = [];
      state.resultRoleId = "";
      state.selectedRoleId = "";
      state.shareText = "";
    }

    function startQuiz() {
      if (APP_DATA.questions.length < TOTAL_QUESTIONS) {
        renderError("题库不足 20 题，当前配置无法开始测试");
        return;
      }

      resetQuizState();
      state.selectedQuestions = sampleQuestions(TOTAL_QUESTIONS);
      state.currentView = "quiz";
      syncHistory("push");
      render();
    }

    function goHome() {
      state.selectedRoleId = "";
      state.currentView = "home";
      syncHistory("push");
      render();
    }

    function showGallery(fromView) {
      state.previousView = fromView || state.currentView;
      state.currentView = "gallery";
      syncHistory("push");
      render();
    }

    function backFromGallery() {
      state.currentView = state.previousView || "home";
      render();
    }

    function openRoleDetail(roleId, fromView) {
      if (!ROLE_MAP[roleId]) {
        return;
      }

      state.previousView = fromView || state.currentView;
      state.selectedRoleId = roleId;
      state.currentView = "detail";
      syncHistory("push");
      render();
    }

    function backFromDetail() {
      state.currentView = state.previousView || "home";
      render();
    }

    function restartQuiz() {
      startQuiz();
    }

    function goPrevQuestion() {
      if (state.currentView !== "quiz" || state.currentQuestionIndex <= 0) {
        return;
      }

      const lastAnswer = state.answers.pop();
      if (lastAnswer && lastAnswer.scores) {
        Object.entries(lastAnswer.scores).forEach(([roleId, score]) => {
          state.scores[roleId] -= score;
        });
      }

      state.currentQuestionIndex -= 1;
      render();
    }

    function answerQuestion(optionIndex) {
      const question = state.selectedQuestions[state.currentQuestionIndex];
      const option = question && question.options[optionIndex];
      if (!question || !option) {
        return;
      }

      Object.entries(option.scores).forEach(([roleId, score]) => {
        state.scores[roleId] += score;
      });

      state.answers.push({
        questionId: question.id,
        optionIndex,
        scores: option.scores
      });

      if (state.currentQuestionIndex < state.selectedQuestions.length - 1) {
        state.currentQuestionIndex += 1;
        render();
        return;
      }

      state.resultRoleId = getFinalRoleId();
      state.shareText = buildShareText(ROLE_MAP[state.resultRoleId]);
      state.currentView = "result";
      syncHistory("push");
      render();
    }

    function getRecentBonus(roleId) {
      return state.answers.slice(-5).reduce((total, answer) => total + (answer.scores[roleId] || 0), 0);
    }

    function getRankedRoles() {
      return APP_DATA.roles
        .map((role, index) => ({
          role,
          total: state.scores[role.id],
          recent: getRecentBonus(role.id),
          tiePower: role.damage + role.logic,
          order: index
        }))
        .sort((left, right) => {
          if (right.total !== left.total) {
            return right.total - left.total;
          }
          if (right.recent !== left.recent) {
            return right.recent - left.recent;
          }
          if (right.tiePower !== left.tiePower) {
            return right.tiePower - left.tiePower;
          }
          return left.order - right.order;
        });
    }

      const [topRole] = getRankedRoles();

                <span class="eyebrow">NBTI · 年轻人迷惑人格图鉴</span>
                <h1>NBTI</h1>
              <div class="hero-subtitle">年轻人的社交迷惑人格测试</div>
              <div class="hero-main-flow">
                <p>NBTI 不走一本正经下定义那套，更像是把嘴硬、冷处理、内耗、上头这些日常状态，整理成一份看得懂也有点好笑的角色档案。你可以先逛图鉴，再做 20 题，最后拿到一个更像成品报告的结果页。</p>
                <div class="hero-badges">
                  <span class="hero-badge">20 个角色档案</span>
                  <span class="hero-badge">24 题题库随机抽 20 题</span>
                  <span class="hero-badge">支持离线直接打开</span>
                </div>
                <div class="cta-row">
                  <button class="button" onclick="startQuiz()">开始 NBTI 测试</button>
                  <button class="ghost-button" onclick="showGallery('home')">浏览全部角色</button>
                </div>
                <div class="hero-stat-strip">
                  <div class="hero-stat">
                    <strong>20</strong>
                    <span>迷惑角色档案</span>
                  </div>
                  <div class="hero-stat">
                    <strong>24</strong>
                    <span>题库存量</span>
                  </div>
                  <div class="hero-stat">
                    <strong>20</strong>
                    <span>本次作答题数</span>
                  </div>
                  <div class="hero-stat">
                    <strong>3D</strong>
                    <span>结果属性画像</span>
                  </div>
                </div>
              </div>
              <div class="hero-inline-note">
                <span><strong>适合谁：</strong>想先玩一玩，也想看起来像正经测试的人</span>
                  <span><strong>怎么开始：</strong>直接测，或者先去图鉴页逛一圈</span>
                </div>
              </div>
              <div class="hero-visual">
                <div class="hero-visual-card hero-visual-main">
                  <div class="hero-visual-title">角色预览</div>
                  <div class="hero-visual-stack">
                    ${featuredRoles.map((role) => `
                      <div class="hero-visual-person">
                        <div>${renderAvatar(role)}</div>
                        <div>
                          <h3>${role.name}</h3>
                          <p>${role.family} · ${role.memeCode} · ${role.code}</p>
                        </div>
                      </div>
                    `).join("")}
                  </div>
                </div>
                <div class="hero-visual-card hero-visual-note">
                  <strong>像测试产品，也保留一点梗感</strong>
                  <span>结果页会把角色、标签、三维属性和更完整的人物说明一起给到你，观感上更像一份认真做过排版的测试报告，不只是弹一句结果就结束。</span>
                </div>
              </div>
            </div>
          </section>
          <section class="meme-strip">
            <div class="meme-strip-head">
              <div>
                <h2>一些熟悉的网络状态</h2>
              </div>
              <p>底部不再放长说明，换成一组更轻的梗词提示，让页面有内容，但看起来还是干净。</p>
            </div>
            <div class="meme-strip-cloud">
              ${memeHighlights.map((item) => `
                <span class="meme-pill"><strong>${item.code}</strong>${item.label}</span>
              `).join("")}
            </div>
            <div class="meme-strip-footer">这些梗词不是结果本身，只是首页先给你一个气质预告。真正的角色归类，还是等你做完 20 题再揭晓。</div>
          </section>
        </div>
      `;
    }

    function renderQuiz() {
      const question = state.selectedQuestions[state.currentQuestionIndex];
      if (!question) {
        return renderError("当前题目加载失败，请重新开始测试");
      }

      return `
        <section class="question-card">
          <div class="toolbar">
            <div>
              <h2>答题中</h2>
              <div class="desc">别想太久，第一反应往往最接近你真正的迷惑体质</div>
            </div>
            <div class="gallery-actions">
              <button class="ghost-button" onclick="goPrevQuestion()" ${state.currentQuestionIndex === 0 ? "disabled" : ""}>返回上一题</button>
              <button class="ghost-button" onclick="goHome()">返回首页</button>
            </div>
          </div>
          ${renderProgress()}
          <div class="question-title">${question.question}？</div>
          <div class="question-hint">如果四个都不算百分百像你，不用纠结，直接选一个相对更接近的。先按第一反应做，结果会更准一点。</div>
          <div class="options">
            ${question.options.map((option, index) => `
              <button class="option" onclick="answerQuestion(${index})">
                <span class="option-index">${LETTERS[index]}</span>
                <span class="option-text">${option.text}</span>
              </button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderStatItem(label, value) {
      return `
        <div class="stat-item">
          <div class="stat-label">${label}</div>
          <div class="stat-track"><div class="stat-fill" style="width: ${value}%"></div></div>
          <div class="stat-value">${value}%</div>
        </div>
      `;
    }

    function renderDetail() {
      const role = ROLE_MAP[state.selectedRoleId];
      if (!role) {
        return renderError("角色详情加载失败，请返回重试");
      }

      return `
        <div class="detail-page">
          <section class="detail-hero">
            <div class="detail-avatar">${renderAvatar(role, "xlarge")}</div>
            <div class="detail-meta">
              <div class="eyebrow">NBTI 角色档案</div>
              <h2>${role.name}</h2>
              <div class="role-family">${role.family}</div>
              <div class="role-code">角色代码：${role.memeCode}</div>
              <div class="micro-tag" style="margin-top: 10px;">迷惑标签：${role.code}</div>
              <p>${role.description}</p>
              <div class="detail-actions">
                <button class="ghost-button" onclick="backFromDetail()">返回上一页</button>
                <button class="ghost-button" onclick="goHome()">返回首页</button>
                <button class="button" onclick="startQuiz()">开始测试</button>
              </div>
            </div>
          </section>

          <div class="detail-grid">
            <section class="detail-card">
              <h3>角色概览</h3>
              <div class="quote-box">“${role.quote}”</div>
              <div class="detail-copy">这个角色最核心的气质是：${role.description}。</div>
              <div class="detail-copy">如果把它放进真实关系里来看，通常会表现为 ${role.socialTip}。但一旦状态失衡，也容易出现 ${role.warning} 这样的结果。</div>
              <div class="detail-subgroup">
                <div class="detail-subtitle">属性画像</div>
                ${renderStatItem("情绪稳定性", role.stability)}
                ${renderStatItem("逻辑自洽度", role.logic)}
                ${renderStatItem("社交伤害力", role.damage)}
              </div>
            </section>

            <section class="detail-card">
              <h3>核心特点</h3>
              <div class="detail-split">
                <div class="detail-subgroup">
                  <div class="detail-subtitle">代表行为</div>
                  <div class="detail-list">
                    ${role.behaviors.map((item) => `<div class="detail-list-item">${item}</div>`).join("")}
                  </div>
                </div>
                <div class="detail-subgroup">
                  <div class="detail-subtitle">关系表现</div>
                  <div class="detail-list">
                    ${role.relationshipStyle.map((item) => `<div class="detail-list-item">${item}</div>`).join("")}
                  </div>
                </div>
              </div>
            </section>

            <section class="detail-card">
              <h3>关系与场景</h3>
              <div class="detail-copy">当这个角色进入日常关系以后，很多问题并不是突然发生的，而是在一些重复场景里慢慢累积出来的。下面这些场景，通常就是最容易把这类人格特质放大的地方。</div>
              <div class="detail-subgroup">
                <div class="detail-subtitle">高发场景</div>
                <div class="detail-list">
                  ${role.triggerScenes.map((item) => `<div class="detail-list-item">${item}</div>`).join("")}
                </div>
              </div>
            </section>

            <section class="detail-card">
              <h3>建议与提醒</h3>
              <div class="detail-split">
                <div class="detail-subgroup">
                  <div class="detail-subtitle">自救建议</div>
                  <div class="detail-list">
                    ${role.selfHelpTips.map((item) => `<div class="detail-list-item">${item}</div>`).join("")}
                  </div>
                </div>
                <div class="detail-subgroup">
                  <div class="detail-subtitle">相处提醒</div>
                  <div class="detail-list">
                    <div class="detail-list-item"><strong>相处提示：</strong>${role.socialTip}</div>
                    <div class="detail-list-item"><strong>风险提示：</strong>${role.warning}</div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      `;
    }

    function renderResult() {
      const role = ROLE_MAP[state.resultRoleId];
      if (!role) {
        return renderError("结果角色缺失，请重新开始测试");
      }

      const rankedRoles = getRankedRoles().slice(0, 3);
      const summary = buildResultSummary(role);

      return `
        <div class="result-layout">
          <section class="result-card">
            <div class="role-top">
              <div class="role-badge-wrap">${renderAvatar(role, "large")}</div>
              <div>
                <div class="eyebrow">角色锁定</div>
                <h2>${role.name}</h2>
                <div class="role-family">${role.family}</div>
                <div class="role-code">角色代码：${role.memeCode}</div>
                <div class="micro-tag" style="margin-top: 10px;">迷惑标签：${role.code}</div>
              </div>
            </div>
            <div class="role-desc">${role.description}</div>
            <div class="stats-grid">
              ${renderStatItem("情绪稳定性", role.stability)}
              ${renderStatItem("逻辑自洽度", role.logic)}
              ${renderStatItem("社交伤害力", role.damage)}
            </div>
            <div class="result-actions" style="margin-top: 24px;">
              <button class="button" onclick="restartQuiz()">再测一次</button>
              <button class="ghost-button" onclick="openRoleDetail('${role.id}', 'result')">查看角色详情</button>
              <button class="ghost-button" onclick="showGallery('result')">查看角色图鉴</button>
            </div>
          </section>

          <div style="display: grid; gap: 16px;">
            <section class="summary-card">
              <h3>系统结论</h3>
              <div class="summary-copy">${summary}</div>
              <div class="summary-actions" style="margin-top: 18px;">
                <button class="ghost-button" onclick="copyShareText()">复制结果文案</button>
              </div>
            </section>

            <section class="rank-card">
              <h3>高频伴生角色</h3>
              <div class="top-grid">
                ${rankedRoles.map((item, index) => `
                  <div class="top-item">
                    <div class="top-left">
                      <div class="rank-no">${index + 1}</div>
                      <div>
                        <div>${item.role.name}</div>
                        <div class="top-sub">${item.role.family}</div>
                      </div>
                    </div>
                    <div class="score-pill">${item.total} 分</div>
                  </div>
                `).join("")}
              </div>
            </section>
          </div>
        </div>
      `;
    }

    function renderGalleryCard(role) {
      return `
        <article class="gallery-card" onclick="openRoleDetail('${role.id}', '${state.currentView === "gallery" ? "gallery" : "home"}')">
          <div class="card-top">
            <div class="card-title">
              ${renderAvatar(role)}
              <div class="card-title-text">
                <div class="card-name">${role.name}</div>
                <div class="card-family">${role.family}</div>
              </div>
            </div>
          </div>
          <div class="card-meta-row">
            <div class="meta-chip code">代码 · ${role.memeCode}</div>
            <div class="meta-chip label">标签 · ${role.code}</div>
            <div class="meta-chip family">${role.family}</div>
          </div>
          <p class="gallery-desc">${role.description}</p>
          <div class="micro-tag" style="margin-top: 12px;">点击查看详情档案</div>
          <div class="gallery-stats">
            <div class="gallery-stat">
              <span>稳定性</span>
              <div class="stat-track"><div class="stat-fill" style="width: ${role.stability}%"></div></div>
              <span>${role.stability}%</span>
            </div>
            <div class="gallery-stat">
              <span>自洽度</span>
              <div class="stat-track"><div class="stat-fill" style="width: ${role.logic}%"></div></div>
              <span>${role.logic}%</span>
            </div>
            <div class="gallery-stat">
              <span>伤害力</span>
              <div class="stat-track"><div class="stat-fill" style="width: ${role.damage}%"></div></div>
              <span>${role.damage}%</span>
            </div>
          </div>
        </article>
      `;
    }

    function renderGallery() {
      return `
        <section class="panel">
          <div class="toolbar">
            <div>
              <h2>NBTI 角色图鉴</h2>
              <div class="desc">这里收录了本次测试的全部 20 个迷惑角色。点击任意卡片，可以进入完整角色详情页查看大头像、代表行为和经典语录。</div>
            </div>
            <div class="gallery-actions">
              <button class="ghost-button" onclick="backFromGallery()">返回上一页</button>
              <button class="button" onclick="startQuiz()">开始测试</button>
            </div>
          </div>
          <div class="gallery-grid">
            ${APP_DATA.roles.map(renderGalleryCard).join("")}
          </div>
        </section>
      `;
    }

    function renderError(message) {
      return `
        <section class="panel">
          <h2>系统短暂抽风</h2>
          <div class="desc">${message}</div>
          <div class="cta-row">
            <button class="button" onclick="goHome()">返回首页</button>
          </div>
        </section>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      if (!app) {
        return;
      }

      let viewMarkup = "";
      switch (state.currentView) {
        case "quiz":
          viewMarkup = renderQuiz();
          break;
        case "detail":
          viewMarkup = renderDetail();
          break;
        case "result":
          viewMarkup = renderResult();
          break;
        case "gallery":
          viewMarkup = renderGallery();
          break;
        case "home":
        default:
          viewMarkup = renderHome();
      }

      app.innerHTML = `${renderNavbar()}${viewMarkup}`;
    }

    if (typeof window.addEventListener === "function") {
      window.addEventListener("popstate", (event) => {
        applyNavState(event.state || { currentView: "home", previousView: "home", selectedRoleId: "", resultRoleId: "", shareText: "" });
        render();
      });
    }

    render();
    syncHistory("replace");
    window.startQuiz = startQuiz;
    window.goHome = goHome;
    window.showGallery = showGallery;
    window.backFromGallery = backFromGallery;
    window.openRoleDetail = openRoleDetail;
    window.backFromDetail = backFromDetail;
    window.restartQuiz = restartQuiz;
    window.goPrevQuestion = goPrevQuestion;
    window.answerQuestion = answerQuestion;
    window.copyShareText = copyShareText;
  </script>
</body>
</html>
