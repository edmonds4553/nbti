<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBTI · 迷惑人格图鉴</title>
  <style>
    :root {
      --bg: #fbfaf7;
      --panel: #ffffff;
      --line: rgba(29, 53, 87, 0.08);
      --line-strong: rgba(29, 53, 87, 0.16);
      --text: #213547;
      --muted: #677489;
      --soft: #f2f6f4;
      --accent: #2f9e7d;
      --accent-2: #54bb97;
      --accent-3: #9ed9c5;
      --shadow: 0 24px 60px rgba(31, 53, 71, 0.07);
      --shadow-soft: 0 14px 32px rgba(31, 53, 71, 0.05);
      --radius: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(143, 205, 184, 0.12), transparent 26%),
        radial-gradient(circle at 86% 16%, rgba(212, 226, 200, 0.2), transparent 24%),
        linear-gradient(180deg, #fffdfa 0%, #fbfaf7 48%, #f7f5f0 100%);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 80;
      height: 66px;
      background: rgba(255,253,250,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center;
    }

    .nav-inner {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }

    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; border: none; background: none; color: var(--text);
    }

    .nav-logo {
      width: 38px; height: 38px; border-radius: 999px;
      background: linear-gradient(145deg, #3aae89, #2f9e7d);
      color: #fff; font-size: 15px; font-weight: 800;
      display: grid; place-items: center;
      flex-shrink: 0;
      box-shadow: 0 10px 22px rgba(47, 158, 125, 0.16);
    }

    .nav-title { font-size: 16px; font-weight: 800; letter-spacing: 0.01em; color: var(--text); }
    .nav-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .nav-actions { display: flex; align-items: center; gap: 8px; }

    /* ── PAGE ── */
    .page {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 88px 0 44px;
    }

    /* ── BUTTONS ── */
    .btn, .btn-ghost {
      border-radius: 999px; padding: 11px 18px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .btn {
      background: linear-gradient(135deg, #2f9e7d, #43b58f);
      color: #fff;
      box-shadow: 0 12px 24px rgba(47, 158, 125, 0.16);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.92);
      color: var(--text);
      border-color: var(--line);
    }

    .btn:hover, .btn-ghost:hover { opacity: 0.96; transform: translateY(-1px); }
    .btn:hover { box-shadow: 0 14px 28px rgba(47, 158, 125, 0.18); }
    .btn-ghost:hover { border-color: var(--line-strong); }
    .btn:disabled, .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── HOME ── */
    .home-hero {
      padding: 18px 0 14px;
    }

    .home-top-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }

    .home-feature-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 24px 24px 22px;
      box-shadow: var(--shadow-soft);
      min-height: 144px;
    }

    .feature-icon {
      width: 44px;
      height: 28px;
      border-radius: 999px;
      background: rgba(47, 158, 125, 0.08);
      border: 1px solid rgba(47, 158, 125, 0.12);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      display: grid;
      place-items: center;
      margin-bottom: 18px;
    }

    .home-feature-card h3 {
      font-size: 19px;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 8px;
    }

    .home-feature-card p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
    }

    .eyebrow {
      display: inline-flex; align-items: center;
      padding: 7px 14px; border-radius: 99px;
      background: rgba(47,158,125,0.08);
      border: 1px solid rgba(47,158,125,0.12);
      color: var(--accent); font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
      margin-bottom: 18px;
    }

    .hero-center {
      min-height: calc(100vh - 260px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 36px 0 28px;
    }

    .hero-copy {
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .home-hero h1 {
      font-size: clamp(64px, 8vw, 104px);
      line-height: 0.98;
      letter-spacing: -0.03em;
      margin-bottom: 22px;
      color: var(--text);
      font-weight: 800;
    }

    .home-hero h1 span {
      display: block;
      margin-top: 14px;
      font-size: clamp(26px, 3vw, 38px);
      line-height: 1.18;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .home-hero .sub {
      font-size: 18px;
      color: var(--muted);
      line-height: 1.95;
      max-width: 760px;
      margin: 0 auto 36px;
    }

    .hero-cta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 34px;
    }

    .stats-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 140px;
      align-items: center;
      padding: 16px 16px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--line);
      box-shadow: 0 8px 20px rgba(31, 53, 71, 0.03);
    }

    .stat-item strong { font-size: 26px; font-weight: 800; color: var(--text); }
    .stat-item span { font-size: 12px; color: var(--muted); text-align: center; }

    .tag-cloud {
      margin-top: 18px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }

    .tag-cloud-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; justify-content: center; flex-wrap: wrap; }
    .tag-cloud-head h2 { font-size: 17px; font-weight: 700; color: var(--text); }
    .tag-cloud-head p { font-size: 13px; color: var(--muted); }

    .tag-cloud-pills { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 13px; border-radius: 99px;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--line);
      font-size: 13px; color: #3d4757;
      box-shadow: none;
    }

    .pill strong { font-size: 11px; color: var(--accent); letter-spacing: 0.04em; }

    /* ── QUIZ ── */
    .quiz-wrap {
      width: min(820px, 100%);
      margin: 34px auto 0;
      min-height: calc(100vh - 140px);
    }

    .quiz-shell {
      width: 100%;
    }

    .quiz-header {
      width: min(700px, 100%);
      margin: 0 auto 24px;
    }

    .quiz-meta {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }

    .quiz-no {
      font-size: 13px; font-weight: 700; color: var(--muted);
    }

    .quiz-actions { display: flex; gap: 8px; }

    .progress-track {
      height: 10px; border-radius: 99px;
      background: #edf3f0;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .progress-fill {
      height: 100%; border-radius: inherit;
      background: linear-gradient(90deg, #2f9e7d, #54bb97, #9ed9c5);
      transition: width 0.25s ease;
    }

    .quiz-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 24px; padding: 40px 40px 36px;
      box-shadow: var(--shadow);
      width: min(700px, 100%);
      margin: 0 auto;
    }

    .quiz-question {
      font-size: clamp(24px, 3.8vw, 30px);
      line-height: 1.45; margin-bottom: 10px; font-weight: 800;
      color: var(--text);
    }

    .quiz-hint {
      font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 26px;
    }

    .options { display: grid; gap: 14px; }

    .option {
      width: 100%; text-align: left;
      padding: 18px 18px; border-radius: 18px;
      border: 1px solid var(--line);
      background: #ffffff; cursor: pointer;
      color: var(--text); font-size: 15px; line-height: 1.6;
      display: flex; align-items: flex-start; gap: 12px;
      transition: border-color 0.15s, background 0.15s, transform 0.15s, box-shadow 0.15s;
    }

    .option:hover {
      border-color: rgba(47,158,125,0.28);
      background: #f9fcfb;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(31, 53, 71, 0.04);
    }

    .opt-letter {
      min-width: 28px; height: 28px; border-radius: 99px;
      background: rgba(47,158,125,0.08); color: var(--accent);
      font-size: 13px; font-weight: 700;
      display: grid; place-items: center; flex-shrink: 0; margin-top: 1px;
    }

    /* ── RESULT ── */
    .result-layout {
      display: grid;
      grid-template-columns: minmax(0,1fr) 320px;
      gap: 18px; margin-top: 28px; align-items: start;
    }

    .result-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 24px; padding: 30px;
      box-shadow: var(--shadow);
    }

    .result-top {
      display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
    }

    .result-card h2 { font-size: 28px; margin-bottom: 4px; color: var(--text); }
    .role-family { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .role-meme { display: inline-block; font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; background: rgba(47,158,125,0.08); padding: 4px 9px; border-radius: 999px; }

    .role-desc { color: var(--muted); font-size: 14px; line-height: 1.8; margin-bottom: 20px; }

    .stat-bars { display: grid; gap: 10px; margin-bottom: 20px; }

    .stat-bar-item {
      display: grid; grid-template-columns: 80px 1fr 44px;
      align-items: center; gap: 10px; font-size: 13px;
    }

    .stat-bar-label { color: var(--muted); }

    .stat-track {
      height: 7px; border-radius: 99px;
      background: #edf3f0; overflow: hidden;
    }

    .stat-fill {
      height: 100%; border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .stat-val { font-weight: 700; font-size: 13px; text-align: right; }

    .result-actions { display: flex; flex-wrap: wrap; gap: 8px; }

    .summary-card, .rank-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 24px; padding: 24px;
      box-shadow: var(--shadow-soft);
    }

    .summary-card h3, .rank-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .summary-copy { font-size: 14px; color: var(--muted); line-height: 1.8; white-space: pre-line; }

    .rank-list { display: grid; gap: 10px; }

    .rank-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-radius: 12px;
      background: #f6faf8;
      border: 1px solid var(--line);
    }

    .rank-left { display: flex; align-items: center; gap: 10px; }
    .rank-no { width: 24px; height: 24px; border-radius: 99px; background: rgba(47,158,125,0.1); color: var(--accent); font-size: 12px; font-weight: 700; display: grid; place-items: center; }
    .rank-name { font-size: 14px; font-weight: 600; }
    .rank-sub { font-size: 12px; color: var(--muted); }
    .score-badge { font-size: 12px; font-weight: 700; color: var(--accent); background: rgba(47,158,125,0.08); padding: 4px 10px; border-radius: 999px; }

    /* ── GALLERY ── */
    .gallery-header {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
      margin-bottom: 22px; flex-wrap: wrap;
    }

    .gallery-header h2 { font-size: 52px; line-height: 1; font-weight: 800; margin-bottom: 10px; color: var(--text); }
    .gallery-header p { font-size: 14px; color: var(--muted); }
    .gallery-actions { display: flex; gap: 8px; align-items: center; }

    .gallery-progress {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #edf3f0;
      box-shadow: inset 0 0 0 1px var(--line);
      overflow: hidden;
      margin-top: 16px;
    }

    .gallery-progress > div {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #2f9e7d, #54bb97);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .gallery-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 22px; padding: 22px; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: var(--shadow-soft);
      min-height: 216px;
    }

    .gallery-card:hover { transform: translateY(-2px); box-shadow: 0 16px 30px rgba(31, 53, 71, 0.06); }

    .gc-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .gc-name { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .gc-family { font-size: 12px; color: var(--muted); }
    .gc-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .gc-tag { font-size: 11px; padding: 4px 8px; border-radius: 999px; font-weight: 700; line-height: 1; }
    .gc-tag.code { background: rgba(47,158,125,0.08); color: var(--accent); }
    .gc-tag.label { background: #f3f7f5; color: #506274; }
    .gc-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 12px; }

    .gc-stats { display: grid; gap: 7px; }
    .gc-stat { display: grid; grid-template-columns: 56px 1fr 36px; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }

    /* ── DETAIL ── */
    .detail-page { margin-top: 24px; }

    .detail-hero {
      display: grid; grid-template-columns: auto 1fr;
      gap: 28px; align-items: start;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 24px; padding: 32px;
      box-shadow: var(--shadow); margin-bottom: 16px;
    }

    .detail-meta h2 { font-size: 30px; margin-bottom: 6px; color: var(--text); }
    .detail-meta p { font-size: 14px; color: var(--muted); line-height: 1.8; margin: 12px 0; }
    .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .detail-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 22px; padding: 22px;
      box-shadow: var(--shadow-soft);
    }

    .detail-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

    .quote-block {
      padding: 14px; border-radius: 12px;
      background: rgba(47,158,125,0.05); border-left: 3px solid var(--accent);
      font-size: 14px; color: #3d4757; line-height: 1.7; margin-bottom: 12px;
    }

    .detail-copy { font-size: 14px; color: var(--muted); line-height: 1.8; margin-bottom: 10px; }
    .detail-sub { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; margin: 14px 0 8px; }

    .detail-list { display: grid; gap: 6px; }

    .detail-list-item {
      font-size: 13px; color: var(--muted); line-height: 1.7;
      padding: 8px 10px; border-radius: 10px; background: #f6faf8;
    }

    .detail-split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* ── AVATARS ── */
    .avatar-portrait {
      position: relative; width: 72px; height: 72px; flex-shrink: 0;
    }

    .avatar-portrait.large { width: 96px; height: 96px; }
    .avatar-portrait.xlarge { width: 120px; height: 120px; }

    .avatar-svg { width: 100%; height: 100%; display: block; }

    .avatar-code {
      position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 10px; font-weight: 800; color: var(--accent);
      letter-spacing: 0.08em; white-space: nowrap;
      box-shadow: 0 8px 16px rgba(31, 53, 71, 0.06);
    }

    /* ── MISC ── */
    .panel {
      background: #ffffff; border: 1px solid var(--line);
      border-radius: 24px; padding: 28px;
      box-shadow: var(--shadow); margin-top: 28px;
    }

    .panel h2 { font-size: 20px; margin-bottom: 8px; }
    .panel p { font-size: 14px; color: var(--muted); line-height: 1.7; }
    .panel-actions { margin-top: 16px; display: flex; gap: 8px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .home-top-cards { grid-template-columns: 1fr; margin-bottom: 36px; }
      .hero-center { min-height: auto; padding: 10px 0 20px; }
      .result-layout { grid-template-columns: 1fr; }
      .detail-hero { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .detail-split { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .gallery-header h2 { font-size: 38px; }
      .stat-bar-item { grid-template-columns: 70px 1fr 36px; }
    }

    @media (max-width: 640px) {
      .page { width: calc(100% - 24px); }
      .quiz-card { padding: 20px; }
      .home-hero h1 { font-size: 48px; }
      .gallery-grid { grid-template-columns: 1fr; }
      .detail-card { padding: 16px; }
    }
  </style>
</head>

  <div id="app"></div>

    // ─── APP STATE ──────────────────────────────────────────────────────────
    const TOTAL_Q = 30;
    const LETTERS = ["A","B","C","D"];

    const roles = ROLES_RAW.map(r => ({...r, ...(ROLE_DETAILS[r.id] || {})}));
    const ROLE_MAP = Object.fromEntries(roles.map((r,i) => [r.id, {...r, order:i}]));

    const state = {
      view: "home",
      prevView: "home",
      selectedRoleId: "",
      questions: [],
      qIndex: 0,
      scores: {},
      answers: [],
      resultId: "",
      shareText: ""
    };

    function initScores() {
      return roles.reduce((a,r) => { a[r.id]=0; return a; }, {});
    }

    // ─── NAVIGATION ─────────────────────────────────────────────────────────
    function goHome() { state.view="home"; state.selectedRoleId=""; render(); }
    function goGallery(from) { state.prevView=from||state.view; state.view="gallery"; render(); }
    function goBackFromGallery() { state.view=state.prevView||"home"; render(); }
    function goDetail(id, from) {
      if(!ROLE_MAP[id]) return;
      state.prevView=from||state.view; state.selectedRoleId=id; state.view="detail"; render();
    }
    function goBackFromDetail() { state.view=state.prevView||"home"; render(); }

    function startQuiz() {
      state.questions = shuffle(ALL_QUESTIONS).slice(0, TOTAL_Q);
      state.qIndex = 0;
      state.scores = initScores();
      state.answers = [];
      state.resultId = "";
      state.selectedRoleId = "";
      state.shareText = "";
      state.view = "quiz";
      render();
      window.scrollTo(0,0);
    }

    function restartQuiz() { startQuiz(); }

    function prevQ() {
      if(state.view!=="quiz" || state.qIndex<=0) return;
      const last = state.answers.pop();
      if(last) Object.entries(last.scores).forEach(([id,v]) => { state.scores[id]-=v; });
      state.qIndex--;
      render();
    }

    function answerQ(idx) {
      const q = state.questions[state.qIndex];
      const opt = q && q.options[idx];
      if(!q || !opt) return;
      Object.entries(opt.scores).forEach(([id,v]) => { state.scores[id]+=v; });
      state.answers.push({ qId:q.id, idx, scores:opt.scores });
      if(state.qIndex < state.questions.length-1) {
        state.qIndex++;
        render();
        window.scrollTo(0,0);
        return;
      }
      state.resultId = getFinalId();
      const role = ROLE_MAP[state.resultId];
      state.shareText = `《NBTI》结果\n我的迷惑身份：${role.emoji} ${role.name}\n家族：${role.family}\n代码：${role.code}\n稳定性：${role.stability}%｜自洽度：${role.logic}%｜伤害力：${role.damage}%`;
      state.view = "result";
      render();
      window.scrollTo(0,0);
    }

    function shuffle(arr) {
      const a = [...arr];
      for(let i=a.length-1;i>0;i--) {
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }

    function getRanked() {
      return roles.map((r,i) => ({
        role:r, total:state.scores[r.id],
        recent: state.answers.slice(-6).reduce((s,a)=>s+(a.scores[r.id]||0),0),
        tie: r.damage+r.logic, order:i
      })).sort((a,b)=>{
        if(b.total!==a.total) return b.total-a.total;
        if(b.recent!==a.recent) return b.recent-a.recent;
        if(b.tie!==a.tie) return b.tie-a.tie;
        return a.order-b.order;
      });
    }

    function getFinalId() {
      return getRanked()[0]?.role.id || roles[0].id;
    }

    async function copyShare() {
      if(!state.shareText) return;
      try {
        if(navigator.clipboard?.writeText) await navigator.clipboard.writeText(state.shareText);
        else {
          const t=document.createElement("textarea");
          t.value=state.shareText; document.body.appendChild(t); t.select();
          document.execCommand("copy"); document.body.removeChild(t);
        }
        alert("结果文案已复制！");
      } catch(e) { alert("复制失败，请手动复制"); }
    }

      };

      return `
        <div class="avatar-portrait ${size==="large"?"large":""} ${size==="xlarge"?"xlarge":""}">
          <svg class="avatar-svg" viewBox="0 0 120 120" width="${wh}" height="${wh}">
            <defs>
              <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#3f2379" flood-opacity="0.12"/>
              </filter>
            </defs>
            <rect x="10" y="10" width="100" height="100" rx="28" fill="#fcfbfe" stroke="${line}" stroke-width="1.8" filter="url(#cardShadow)"/>
            <rect x="20" y="20" width="80" height="80" rx="26" fill="${frame}" opacity="0.82"/>
            <ellipse cx="60" cy="36" rx="22" ry="12" fill="${accent}" opacity="0.12"/>
            <path d="M28 104 C32 84 45 74 60 74 C75 74 88 84 92 104" fill="${p.top}"/>
            <rect x="54" y="69" width="12" height="14" rx="5" fill="${p.skin}"/>
            ${faceMap[p.face]||faceMap.oval}
            ${hairMap[p.hairStyle]||hairMap.short}
            ${eyeMap[p.mood]||eyeMap.calm}
            ${mouthMap[p.mood]||mouthMap.calm}
            ${accMap[p.accessory]||""}
          </svg>
          <div class="avatar-code">${role.memeCode}</div>
        </div>`;
    }

    // ─── RENDER FUNCTIONS ────────────────────────────────────────────────────
    function renderNav() {
      const isHome = state.view === "home";
      const isGallery = state.view === "gallery";
      const isQuiz = state.view === "quiz";
      const navBtn = (label, active, onClick) => `<button class="${active ? "btn" : "btn-ghost"}" onclick="${onClick}">${label}</button>`;
      return `<nav class="nav">
        <div class="nav-inner">
          <button class="nav-brand" onclick="goHome()">
            <div class="nav-logo">N</div>
            <div><div class="nav-title">NBTI</div><div class="nav-sub">迷惑人格图鉴</div></div>
          </button>
          <div class="nav-actions">
            ${navBtn("首页", isHome, "goHome()")}
            ${navBtn("角色图鉴", isGallery, "goGallery('home')")}
            ${navBtn("开始测试", isQuiz, "startQuiz()")}
          </div>
        </div>
      </nav>`;
    }

    function renderHome() {
      const pills = [
        {code:"OJBK",label:"都可以，但别真问我"},
        {code:"PFLA",label:"表面没事，内心破防"},
        {code:"YDLD",label:"已读，但先冷一下"},
        {code:"NSBJ",label:"你随便，其实很在意"},
        {code:"BEBE",label:"意难平专用频道"},
        {code:"CWCY",label:"查无此人式潜水"},
        {code:"EMOO",label:"深夜情绪循环播放"},
        {code:"JYYB",label:"这笔账我先记下"},
        {code:"GFSC",label:"哪边声音大我就去哪"},
        {code:"WZD",label:"脑子懂，身体不动"}
      ];

      return `
        <div class="home-hero">
          <div class="home-top-cards">
            <div class="home-feature-card">
              <div class="feature-icon">01</div>
              <h3>20 种迷惑人格</h3>
              <p>把年轻人常见的社交别扭和关系状态，整理成一套可以直接对号入座的人格图鉴。</p>
            </div>
            <div class="home-feature-card">
              <div class="feature-icon">02</div>
              <h3>结果更像报告</h3>
              <p>不只是给一个名字，测完还会看到标签、属性画像和更完整的人物说明。</p>
            </div>
            <div class="home-feature-card">
              <div class="feature-icon">03</div>
              <h3>角色图鉴</h3>
              <p>可以先逛图鉴认人设，也可以直接开始测试，最后再回来看自己更像哪种类型。</p>
            </div>
          </div>
          <div class="hero-center">
            <div class="hero-copy">
              <div class="eyebrow">NBTI · 年轻人的社交迷惑人格测试</div>
              <h1>NBTI<span>发现你在社交里的真实频道</span></h1>
              <p class="sub">NBTI 不走一本正经下定义那套，更像是把嘴硬、冷处理、内耗、上头这些日常状态，整理成一份看得懂也有点好笑的角色档案。可以先逛图鉴，再做题，最后拿到更像成品报告的结果页。</p>
              <div class="hero-cta">
                <button class="btn" onclick="startQuiz()">开始测试 →</button>
              </div>
              <div class="stats-row">
                <div class="stat-item"><strong>20</strong><span>迷惑角色档案</span></div>
                <div class="stat-item"><strong>30</strong><span>题库题目数量</span></div>
                <div class="stat-item"><strong>30</strong><span>本次作答题数</span></div>
                <div class="stat-item"><strong>3D</strong><span>结果属性画像</span></div>
              </div>
            </div>
          </div>
          <div class="tag-cloud">
            <div class="tag-cloud-head">
              <h2>一些熟悉的网络状态</h2>
              <p>做完测试才知道你属于哪一种</p>
            </div>
            <div class="tag-cloud-pills">
              ${pills.map(p=>`<span class="pill"><strong>${p.code}</strong>${p.label}</span>`).join("")}
            </div>
          </div>
        </div>`;
    }

    function renderQuiz() {
      const q = state.questions[state.qIndex];
      if(!q) return `<div class="panel"><h2>题目加载失败</h2><div class="panel-actions"><button class="btn" onclick="startQuiz()">重新开始</button></div></div>`;
      const pct = ((state.qIndex+1)/TOTAL_Q*100).toFixed(1);
      return `
        <div class="quiz-wrap">
          <div class="quiz-shell">
            <div class="quiz-header">
              <div class="quiz-meta">
                <div class="quiz-no">问题 ${state.qIndex+1} / ${TOTAL_Q}</div>
                <div class="role-meme">${pct}%</div>
              </div>
              <div class="progress-track">
                <div class="progress-fill" style="width:${pct}%"></div>
              </div>
            </div>
            <div class="quiz-card">
              <div class="quiz-question">${q.question}？</div>
              <div class="quiz-hint">如果没有完全符合的选项，就选一个相对更接近你的。别想太久，第一反应通常更准一点。</div>
              <div class="options">
                ${q.options.map((opt,i)=>`
                  <button class="option" onclick="answerQ(${i})">
                    <span class="opt-letter">${LETTERS[i]}</span>
                    <span>${opt.text}</span>
                  </button>
                `).join("")}
              </div>
            </div>
            <div class="panel-actions" style="justify-content:flex-start; margin-top:18px;">
              <button class="btn-ghost" onclick="prevQ()" ${state.qIndex===0?"disabled":""}>← 上一题</button>
              <button class="btn-ghost" onclick="goHome()">退出</button>
            </div>
          </div>
        </div>`;
    }

    function renderStatBar(label, val) {
      return `<div class="stat-bar-item">
        <div class="stat-bar-label">${label}</div>
        <div class="stat-track"><div class="stat-fill" style="width:${Math.min(val,100)}%"></div></div>
        <div class="stat-val">${val}%</div>
      </div>`;
    }

    function renderResult() {
      const role = ROLE_MAP[state.resultId];
      if(!role) return `<div class="panel"><h2>结果加载失败</h2><div class="panel-actions"><button class="btn" onclick="startQuiz()">重新测试</button></div></div>`;
      const ranked = getRanked().slice(0,3);
      const summary = `检测完成：你的人格主频道锁定为【${role.name}】。\n核心逻辑：${role.description}\n简而言之，你不是情绪有问题，你只是把当代人的迷惑行为练成了稳定技能。`;

      return `
        <div class="result-layout">
          <div class="result-card">
            <div class="result-top">
              <div>${renderAvatar(role,"large")}</div>
              <div>
                <div class="eyebrow" style="margin-bottom:8px;">角色锁定</div>
                <h2>${role.name}</h2>
                <div class="role-family">${role.family}</div>
                <span class="role-meme">${role.memeCode} · ${role.code}</span>
              </div>
            </div>
            <div class="role-desc">${role.description}</div>
            <div class="stat-bars">
              ${renderStatBar("情绪稳定性", role.stability)}
              ${renderStatBar("逻辑自洽度", role.logic)}
              ${renderStatBar("社交伤害力", role.damage)}
            </div>
            <div class="result-actions">
              <button class="btn" onclick="restartQuiz()">再测一次</button>
              <button class="btn-ghost" onclick="goDetail('${role.id}','result')">角色详情</button>
              <button class="btn-ghost" onclick="goGallery('result')">浏览图鉴</button>
            </div>
          </div>
          <div style="display:grid;gap:14px;">
            <div class="summary-card">
              <h3>系统结论</h3>
              <div class="summary-copy">${summary}</div>
              <div style="margin-top:14px;">
                <button class="btn-ghost" onclick="copyShare()">复制结果文案</button>
              </div>
            </div>
            <div class="rank-card">
              <h3>高频伴生角色</h3>
              <div class="rank-list">
                ${ranked.map((item,i)=>`
                  <div class="rank-item">
                    <div class="rank-left">
                      <div class="rank-no">${i+1}</div>
                      <div><div class="rank-name">${item.role.name}</div><div class="rank-sub">${item.role.family}</div></div>
                    </div>
                    <span class="score-badge">${item.total} 分</span>
                  </div>
                `).join("")}
              </div>
            </div>
          </div>
        </div>`;
    }

    function renderGallery() {
      return `
        <div>
          <div class="gallery-header">
            <div>
              <h2>角色图鉴</h2>
              <p>已收录 ${roles.length} / ${roles.length} 个迷惑角色</p>
              <div class="gallery-progress"><div></div></div>
            </div>
            <div class="gallery-actions">
              <button class="btn-ghost" onclick="goBackFromGallery()">← 返回</button>
              <button class="btn" onclick="startQuiz()">继续测试</button>
            </div>
          </div>
          <div class="gallery-grid">
            ${roles.map(r=>`
              <div class="gallery-card" onclick="goDetail('${r.id}','gallery')">
                <div class="gc-top">
                  ${renderAvatar(r)}
                  <div>
                    <div class="gc-name">${r.name}</div>
                    <div class="gc-family">${r.family}</div>
                  </div>
                </div>
                <div class="gc-tags">
                  <span class="gc-tag code">${r.memeCode}</span>
                  <span class="gc-tag label">${r.code}</span>
                </div>
                <div class="gc-desc">${r.description.slice(0,60)}…</div>
                <div class="gc-stats">
                  <div class="gc-stat"><span>稳定性</span><div class="stat-track"><div class="stat-fill" style="width:${r.stability}%"></div></div><span>${r.stability}%</span></div>
                  <div class="gc-stat"><span>自洽度</span><div class="stat-track"><div class="stat-fill" style="width:${Math.min(r.logic,100)}%"></div></div><span>${r.logic}%</span></div>
                  <div class="gc-stat"><span>伤害力</span><div class="stat-track"><div class="stat-fill" style="width:${r.damage}%"></div></div><span>${r.damage}%</span></div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>`;
    }

    function renderDetail() {
      const role = ROLE_MAP[state.selectedRoleId];
      if(!role) return `<div class="panel"><h2>角色加载失败</h2><div class="panel-actions"><button class="btn" onclick="goHome()">返回首页</button></div></div>`;

      return `
        <div class="detail-page">
          <div class="detail-hero">
            <div>${renderAvatar(role,"xlarge")}</div>
            <div class="detail-meta">
              <div class="eyebrow" style="margin-bottom:10px;">NBTI 角色档案</div>
              <h2>${role.name}</h2>
              <div class="role-family">${role.family}</div>
              <span class="role-meme" style="margin-top:6px;display:inline-block;">${role.memeCode} · ${role.code}</span>
              <p>${role.description}</p>
              <div class="detail-actions">
                <button class="btn-ghost" onclick="goBackFromDetail()">← 返回</button>
                <button class="btn-ghost" onclick="goHome()">首页</button>
                <button class="btn" onclick="startQuiz()">开始测试</button>
              </div>
            </div>
          </div>
          <div class="detail-grid">
            <div class="detail-card">
              <h3>角色概览</h3>
              <div class="quote-block">"${role.quote||""}"</div>
              <div class="detail-copy">${role.socialTip||""}</div>
              <div class="detail-sub">属性画像</div>
              ${renderStatBar("情绪稳定性",role.stability)}
              ${renderStatBar("逻辑自洽度",role.logic)}
              ${renderStatBar("社交伤害力",role.damage)}
            </div>
            <div class="detail-card">
              <h3>核心特点</h3>
              <div class="detail-sub">代表行为</div>
              <div class="detail-list">${(role.behaviors||[]).map(b=>`<div class="detail-list-item">${b}</div>`).join("")}</div>
              <div class="detail-sub">关系表现</div>
              <div class="detail-list">${(role.relationshipStyle||[]).map(b=>`<div class="detail-list-item">${b}</div>`).join("")}</div>
            </div>
            <div class="detail-card">
              <h3>高发场景</h3>
              <div class="detail-list">${(role.triggerScenes||[]).map(b=>`<div class="detail-list-item">${b}</div>`).join("")}</div>
              <div class="detail-sub" style="margin-top:16px;">风险提示</div>
              <div class="detail-copy">${role.warning||""}</div>
            </div>
            <div class="detail-card">
              <h3>自救建议</h3>
              <div class="detail-list">${(role.selfHelpTips||[]).map(b=>`<div class="detail-list-item">${b}</div>`).join("")}</div>
              <div class="detail-sub" style="margin-top:16px;">相处提示</div>
              <div class="detail-copy">${role.socialTip||""}</div>
            </div>
          </div>
        </div>`;
    }

    // ─── MAIN RENDER ────────────────────────────────────────────────────────
    function render() {
      let content = "";
      switch(state.view) {
        case "quiz":    content = renderQuiz(); break;
        case "result":  content = renderResult(); break;
        case "gallery": content = renderGallery(); break;
        case "detail":  content = renderDetail(); break;
        default:        content = renderHome();
      }

      document.getElementById("app").innerHTML = `
        ${renderNav()}
        <div class="page">${content}</div>
      `;
    }

    // Expose globals
    window.goHome = goHome;
    window.goGallery = goGallery;
    window.goBackFromGallery = goBackFromGallery;
    window.goDetail = goDetail;
    window.goBackFromDetail = goBackFromDetail;
    window.startQuiz = startQuiz;
    window.restartQuiz = restartQuiz;
    window.prevQ = prevQ;
    window.answerQ = answerQ;
    window.copyShare = copyShare;

    render();
  </script>
</body>
</html>
